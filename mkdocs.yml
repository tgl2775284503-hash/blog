site_name: 小V博客
site_url: https://你的用户名.github.io/blog/

theme:
  name: material
  language: zh
  custom_dir: overrides 
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  
  # 1. 主题颜色开关
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-sunny  # 👈 建议用这个图标，语义更清晰
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night  # 👈 建议用这个图标
        name: 切换到浅色模式

# 额外样式        
extra_css:
  - stylesheets/extra.css

# 2. 插件设置
plugins:
  - search:
      lang: zh
  - tags
  - blog:
      pagination_per_page: 5

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

# 3. 导航栏结构
nav:
  - 首页: index.md
  - 专栏博客: 
      - blog/index.md
  - 推荐及工具:
      - 推荐: 
          - recommend/index.md
      - 工具: 
          - tools/index.md
          - 常用工具: tools/2026-03-26-tools.md
          - Openclaw安装、使用文档: tools/2026-03-26-Openclaw-tools.md
